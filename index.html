<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home | Not Available</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Science+Gothic&display=swap" rel="stylesheet">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f0f17, #1b1c2e);
    font-family: 'Bebas Neue', sans-serif;
    overflow: hidden;
    position: relative;
}

/* Particle Background */
#particles-js {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* Glassmorphism Box */
.dialogue-box {
    width: 90%;
    max-width: 500px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 25px;
    padding: 35px 25px;
    text-align: center;
    border: 2px solid;
    border-image: linear-gradient(45deg, #ff8a00, #c83fff, #4db1ff) 1;
    box-shadow: 0 0 25px rgba(255,255,255,0.2), inset 0 0 15px rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    animation: fadeUp 1.2s ease;
    position: relative;
    transition: opacity 1s ease;
}

/* Watermark */
.watermark {
    position: absolute;
    bottom: 8px;
    right: 12px;
    opacity: 0.08;
    font-size: 18px;
    font-family: 'Exo 2';
}

/* Animations */
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}
@keyframes floatIcon {
    from { transform: translateY(0); }
    to { transform: translateY(-12px); }
}

/* Typing Text */
.typing-text {
    font-size: 2rem;
    min-height: 50px;
    letter-spacing: 1.2px;
    color: #fff;
}

/* Block Icon */
.block-img {
    width: 80px;
    max-width: 20%;
    margin: 20px auto;
    filter: drop-shadow(0 0 12px rgba(255,255,255,0.3));
    animation: floatIcon 3s ease-in-out infinite alternate;
}

/* Subheading */
.subheading {
    font-family: 'Exo 2', sans-serif;
    font-size: 1rem;
    margin-top: 10px;
    line-height: 1.4;
    color: #d7d7d7;
}

/* Email */
.email-line {
    margin-top: 20px;
    font-family: 'Science Gothic', sans-serif;
    font-size: 1rem;
    color: #fff;
}
a { color: #ffbb55; text-decoration: underline; }
a:hover { opacity: 0.7; }

/* Button */
.premium-btn {
    margin-top: 18px;
    padding: 10px 20px;
    font-size: 1rem;
    font-family: 'Exo 2';
    border-radius: 12px;
    background: linear-gradient(135deg, #ff8a00, #c83fff);
    border: none;
    color: #fff;
    box-shadow: 0 0 15px rgba(200, 63, 255, 0.6);
    transition: 0.3s ease;
    width: 60%;
    max-width: 200px;
}
.premium-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 25px rgba(255, 150, 0, 0.8);
}

/* Loader */
#loader-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0f0f17;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}
.loader {
    width: 50px;
    height: 50px;
    border: 6px solid #ffffff22;
    border-top: 6px solid #ff8a00;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Goodbye Screen */
.goodbye-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #1b1c2e, #0f0f17);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #ffbb55;
    font-size: 2rem;
    font-family: 'Bebas Neue';
    flex-direction: column;
    opacity: 0;
    visibility: hidden;
    transition: opacity 1.5s ease, visibility 1.5s;
    z-index: 10000;
}
.goodbye-screen.show { opacity: 1; visibility: visible; }

/* Responsive */
@media(max-width:768px){
    .typing-text{font-size:1.8rem;}
    .subheading{font-size:0.95rem;}
    .email-line{font-size:0.95rem;}
    .block-img{width:70px;}
    .premium-btn{width:70%; font-size:0.95rem;}
}
@media(max-width:480px){
    .typing-text{font-size:1.5rem;}
    .subheading{font-size:0.85rem;}
    .email-line{font-size:0.85rem;}
    .block-img{width:60px;}
    .premium-btn{width:75%; font-size:0.85rem;}
    .watermark{font-size:14px;}
    .goodbye-screen{font-size:1.5rem;}
}
</style>
</head>
<body>

<div id="loader-wrapper"><div class="loader"></div></div>
<div id="particles-js"></div>

<div class="dialogue-box">
    <h2 class="typing-text" id="typing"></h2>
    <img src="https://raw.githubusercontent.com/mianammar09/Social-Media-Handles/9b73695f7481cdd1b53a2c37c4e56ba8ffa93b2e/block.png" class="block-img" alt="Block Icon">
    <p class="subheading">Oops! The Insta account and link are not in use anymore and are disabled by the owner.</p>
    <p class="email-line">Message / Query → <a href="mailto:immianammar@gmail.com"><strong>immianammar@gmail.com</strong></a></p>
    <button class="premium-btn">Close</button>
    <div class="watermark">Ammar Ajmal</div>
</div>

<div class="goodbye-screen" id="goodbyeScreen">Goodbye! <br> See you soon.</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script>
particlesJS.load('particles-js', 'https://raw.githubusercontent.com/VincentGarreau/particles.js/master/demo/particles.json');
</script>

<script>
const texts = ["Hi, This is Ammar Ajmal...","A software engineer...","A self optimistic..."];
let index = 0;
const typingElement = document.getElementById("typing");

function typeAndDelete(){
    const currentText = texts[index];
    let charIndex = 0;
    const typeInterval = setInterval(()=>{
        typingElement.textContent += currentText[charIndex];
        charIndex++;
        if(charIndex===currentText.length){
            clearInterval(typeInterval);
            setTimeout(deleteText,1500);
        }
    },75);
}

function deleteText(){
    let currentText = typingElement.textContent;
    let charIndex = currentText.length;
    const deleteInterval = setInterval(()=>{
        typingElement.textContent = currentText.substring(0,charIndex-1);
        charIndex--;
        if(charIndex===0){
            clearInterval(deleteInterval);
            index=(index+1)%texts.length;
            setTimeout(typeAndDelete,400);
        }
    },45);
}

typeAndDelete();

window.onload = ()=>{setTimeout(()=>{document.getElementById('loader-wrapper').style.display='none';},1200);};

// Close button with responsive goodbye animation
document.querySelector('.premium-btn').addEventListener('click', ()=>{
    const goodbye = document.getElementById('goodbyeScreen');
    const dialogueBox = document.querySelector('.dialogue-box');

    dialogueBox.style.pointerEvents='none';
    dialogueBox.style.opacity='0';
    goodbye.classList.add('show');

    setTimeout(()=>{
        document.body.innerHTML='';
        document.body.style.background='#0f0f17';
    },2500);
});
</script>

</body>
</html>
